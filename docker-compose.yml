services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: autocodeosdb
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: autocodeuser
      POSTGRES_PASSWORD: autocodepass
      POSTGRES_DB: autocodeosdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocodeuser -d autocodeosdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    image: node:24-alpine
    container_name: autocodeos-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    env_file:
      - .env
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      PORT: ${WEB_PORT}
      NEXT_PUBLIC_API_URL: http://localhost:${SERVER_PORT}/api/v1
    volumes:
      - ./web:/app
    depends_on:
      server:
        condition: service_started
      postgres:
        condition: service_healthy

  server:
    image: golang:1.26
    container_name: autocodeos-server
    working_dir: /app/server
    command: sh -c "go run ./cmd/api"
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      DATABASE_URL: postgres://autocodeuser:autocodepass@postgres:5432/autocodeosdb?sslmode=disable
      SERVER_PORT: ${SERVER_PORT}
      WEB_PORT: ${WEB_PORT}
      CORS_ALLOWED_ORIGINS: http://localhost:${WEB_PORT},http://127.0.0.1:${WEB_PORT}
    volumes:
      - .:/app
      - go-mod:/go/pkg/mod
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  go-mod:
