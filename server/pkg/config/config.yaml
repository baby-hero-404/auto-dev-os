server:
  port: "32080"
  web_port: "32300"
  cors_allowed_origins: ""

llm:
  provider: "openai"
  model: ""
  fast_model: "gpt-4o-mini"
  balanced_model: "gpt-4o"
  powerful_model: "gpt-4o"
  anthropic_balanced_model: "claude-sonnet-4-20250514"
  anthropic_powerful_model: "claude-opus-4-20250514"
  gemini_fast_model: "gemini-2.5-flash"
  gemini_balanced_model: "gemini-2.5-pro"
  circuit_max_tokens: 120000
  circuit_max_cost_usd: 2.50
  default_output_tokens: 2048
  max_retries: 2
  embedding_model: "text-embedding-3-small"
  base_url: ""
  api_key: ""
  openai_api_key: ""
  anthropic_api_key: ""
  gemini_api_key: ""

database:
  url: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_seconds: 1800
  conn_max_idle_time_seconds: 300

auth:
  jwt_secret: ""

sandbox:
  runtime: "stub"
  image: "auto-code-os-sandbox:latest"
  workspace_root: "/tmp/auto-code-os/workspaces"
  workspace_retention_hours: 72
  workspace_cleanup_interval_minutes: 60
  memory_mb: 1024
  nano_cpus: 1000000000

worker:
  enabled: true
  interval_ms: 30000
  concurrency: 1

telemetry:
  otlp_endpoint: ""

logging:
  local_retention_days: 14
  file_root: "/tmp/auto-code-os/logs"


