auto_code_os:
  data_root: "./.data"

server:
  port: "32080"
  web_port: "32300"
  cors_allowed_origins: ""
  version: "0.2.0"


llm:
  provider: "gateway"
  model: ""
  fast_model: "gpt-5.4-nano"
  balanced_model: "gpt-5.4"
  powerful_model: "gpt-5.5"
  anthropic_balanced_model: "claude-sonnet-4-6"
  anthropic_powerful_model: "claude-opus-4-8"
  gemini_fast_model: "gemini-3.1-flash-lite"
  gemini_balanced_model: "gemini-3.5-flash"
  circuit_max_tokens: 120000
  circuit_max_cost_usd: 2.50
  default_output_tokens: 2048
  max_retries: 2
  embedding_model: "text-embedding-3-small"
  base_url: ""
  api_key: ""
  openai_api_key: ""
  anthropic_api_key: ""
  gemini_api_key: ""

database:
  url: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_seconds: 1800
  conn_max_idle_time_seconds: 300

auth:
  jwt_secret: ""

sandbox:
  runtime: "docker"
  image: "auto-code-os-sandbox:latest"
  workspace_root: "/tmp/auto-code-os/workspaces"
  skills_root: "/home/ubuntu/my_projects/skills"
  workspace_retention_hours: 72
  workspace_cleanup_interval_minutes: 60
  memory_mb: 1024
  nano_cpus: 1000000000
  disable_networking: false

worker:
  enabled: true
  interval_ms: 30000
  concurrency: 1
  max_phase_cost: 30.0

telemetry:
  otlp_endpoint: ""

logging:
  local_retention_days: 14
  file_root: "/tmp/auto-code-os/logs"
  llm_trace_enabled: true
  llm_log_level: "debug"


